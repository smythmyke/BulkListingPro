name: Publish blog drafts

on:
  schedule:
    # Mon, Wed, Fri at 14:00 UTC (10am ET / 7am PT)
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run publisher script
        run: python scripts/publish-next-article.py

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "blog: scheduled publish $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
